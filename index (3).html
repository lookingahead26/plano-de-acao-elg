<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Ação | Árvore Lógica – Event Led Growth</title>
    
    <style>
        :root {
            --primary: #E31837;
            --primary-dark: #B81430;
            --dark: #0A0A0A;
            --dark-secondary: #141414;
            --dark-card: #1A1A1A;
            --dark-border: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #666666;
            --success: #10B981;
            --warning: #F59E0B;
            --info: #3B82F6;
            --purple: #8B5CF6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--dark); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; }

        /* ── HEADER ── */
        .header {
            background: linear-gradient(135deg, var(--dark) 0%, var(--dark-secondary) 100%);
            padding: 40px;
            border-bottom: 1px solid var(--dark-border);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute; top: 0; right: 0;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(227,24,55,0.12) 0%, transparent 70%);
            pointer-events: none;
        }
        .header-content { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 24px; }
        .header-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(227,24,55,0.15); border: 1px solid rgba(227,24,55,0.3);
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            color: var(--primary); font-weight: 600; margin-bottom: 16px;
        }
        .header-badge span { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); display: inline-block; }
        .header h1 { font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.1; margin-bottom: 8px; }
        .header h1 em { color: var(--primary); font-style: normal; }
        .header-sub { font-size: 14px; color: var(--text-secondary); font-weight: 300; max-width: 580px; line-height: 1.6; }
        .header-stats { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 28px; }
        .stat-pill {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            padding: 10px 20px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; gap: 2px;
        }
        .stat-pill strong { font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-pill span { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; }
        .hypothesis-card {
            background: rgba(227,24,55,0.08); border: 1px solid rgba(227,24,55,0.25);
            border-radius: 12px; padding: 20px 24px; max-width: 420px;
        }
        .hypothesis-card label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--primary); font-weight: 700; display: block; margin-bottom: 8px; }
        .hypothesis-card p { font-size: 13px; line-height: 1.7; color: #ddd; }

        /* ── NAV ── */
        .nav {
            background: var(--dark-secondary);
            border-bottom: 1px solid var(--dark-border);
            padding: 0 40px;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; gap: 4px; overflow-x: auto; }
        .nav-tab {
            padding: 16px 20px; font-size: 13px; font-weight: 500;
            color: var(--text-muted); background: none; border: none;
            border-bottom: 2px solid transparent; cursor: pointer;
            white-space: nowrap; transition: all 0.2s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .nav-tab:hover { color: var(--text-primary); }
        .nav-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* ── MAIN ── */
        .main { max-width: 1400px; margin: 0 auto; padding: 40px; }

        /* ── SECTION HEADER ── */
        .section-header { margin-bottom: 28px; }
        .section-tag {
            display: inline-block; font-size: 10px; letter-spacing: 2px;
            text-transform: uppercase; color: var(--primary); font-weight: 700;
            margin-bottom: 8px;
        }
        .section-header h2 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .section-header p { font-size: 14px; color: var(--text-secondary); }

        /* ── DIVIDER ── */
        .section-divider {
            border: none; border-top: 1px solid var(--dark-border);
            margin: 48px 0;
        }

        /* ── TOC CARDS ── */
        .toc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
        .toc-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px; position: relative; overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
        }
        .toc-card:hover { border-color: rgba(227,24,55,0.4); transform: translateY(-2px); }
        .toc-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
        }
        .toc-card.high::before { background: var(--primary); }
        .toc-card.med::before { background: var(--warning); }
        .toc-card.low::before { background: var(--dark-border); }
        .toc-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .toc-num { font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 4px; font-weight: 600; }
        .priority-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 3px 10px; border-radius: 20px; }
        .priority-alta { background: rgba(227,24,55,0.15); color: var(--primary); }
        .priority-media { background: rgba(245,158,11,0.15); color: var(--warning); }
        .priority-baixa { background: rgba(100,100,120,0.2); color: var(--text-muted); }
        .toc-card h3 { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 14px; }
        .toc-block { margin-bottom: 12px; }
        .toc-block-label {
            font-size: 9px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
            margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
        }
        .toc-block-label::after { content: ''; flex: 1; height: 1px; background: currentColor; opacity: 0.2; }
        .lbl-fato { color: #aaa; }
        .lbl-causa { color: var(--warning); }
        .lbl-acao { color: var(--success); }
        .toc-item { font-size: 12px; color: #bbb; line-height: 1.6; padding-left: 14px; position: relative; margin-bottom: 3px; }
        .toc-item.causa::before { content: '→'; position: absolute; left: 0; color: var(--warning); }
        .toc-item.acao::before { content: '✓'; position: absolute; left: 0; color: var(--success); }

        /* ── KPI BAR ── */
        .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 32px; }
        .kpi-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 10px; padding: 18px 20px;
        }
        .kpi-card-icon { font-size: 22px; margin-bottom: 8px; }
        .kpi-card-val { font-size: 26px; font-weight: 800; margin-bottom: 2px; }
        .kpi-card-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
        .kpi-red { border-top: 2px solid var(--primary); }
        .kpi-green { border-top: 2px solid var(--success); }
        .kpi-yellow { border-top: 2px solid var(--warning); }
        .kpi-blue { border-top: 2px solid var(--info); }
        .kpi-purple { border-top: 2px solid var(--purple); }

        /* ── ACTIONS TABLE ── */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .filter-btn {
            padding: 7px 16px; border-radius: 20px; border: 1px solid var(--dark-border);
            background: var(--dark-card); color: var(--text-secondary); font-size: 12px;
            font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        .filter-btn:hover { border-color: var(--primary); color: var(--text-primary); }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--dark-border); }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--dark-secondary); padding: 14px 16px;
            text-align: left; font-size: 11px; letter-spacing: 1px;
            text-transform: uppercase; color: var(--text-muted); font-weight: 600;
            border-bottom: 1px solid var(--dark-border); white-space: nowrap;
        }
        td {
            padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--dark-border);
            vertical-align: top; line-height: 1.5;
        }
        tr:last-child td { border-bottom: none; }
        tr.hidden-row { display: none; }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .tag {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .tag-produto { background: rgba(227,24,55,0.15); color: var(--primary); }
        .tag-lideranca { background: rgba(139,92,246,0.15); color: var(--purple); }
        .tag-vendas { background: rgba(245,158,11,0.15); color: var(--warning); }
        .tag-operacao { background: rgba(16,185,129,0.15); color: var(--success); }
        .tag-marketing { background: rgba(59,130,246,0.15); color: var(--info); }
        .tag-crm { background: rgba(255,100,50,0.15); color: #ff8c5a; }
        .tag-comunidade { background: rgba(20,184,166,0.15); color: #2dd4bf; }
        .pri-alta { color: var(--primary); font-weight: 700; }
        .pri-media { color: var(--warning); font-weight: 600; }
        .pri-baixa { color: var(--text-muted); }
        .deadline-chip {
            display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 600;
            background: rgba(255,255,255,0.06); color: var(--text-secondary);
        }
        .resp-chip {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px;
            background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid var(--dark-border);
        }

        /* ── PDCA ── */
        .pdca-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
        .pdca-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px;
        }
        .pdca-letter { font-size: 36px; font-weight: 800; margin-bottom: 4px; }
        .pdca-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text-secondary); }
        .pdca-card ul { list-style: none; }
        .pdca-card ul li { font-size: 12px; color: var(--text-secondary); padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04); line-height: 1.5; }
        .pdca-card ul li:last-child { border-bottom: none; }
        .pdca-card ul li::before { content: '· '; color: currentColor; }

        /* ── DMAIC ── */
        .dmaic-flow { display: flex; gap: 0; border: 1px solid var(--dark-border); border-radius: 12px; overflow: hidden; }
        .dmaic-step { flex: 1; padding: 20px 18px; background: var(--dark-card); border-right: 1px solid var(--dark-border); position: relative; }
        .dmaic-step:last-child { border-right: none; }
        .dmaic-letter { font-size: 28px; font-weight: 800; color: var(--success); margin-bottom: 4px; }
        .dmaic-step h5 { font-size: 12px; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .dmaic-step p { font-size: 11px; color: var(--text-muted); line-height: 1.6; }

        /* ── FALCONI PILLARS ── */
        .pillars-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
        .pillar-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px;
        }
        .pillar-icon { font-size: 32px; margin-bottom: 12px; }
        .pillar-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .pillar-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
        .pillar-card ul { list-style: none; }
        .pillar-card ul li { font-size: 12px; color: var(--text-muted); padding: 3px 0; padding-left: 12px; position: relative; }
        .pillar-card ul li::before { content: '→'; position: absolute; left: 0; color: var(--primary); font-size: 10px; }

        /* ── QUICK WINS ── */
        .wins-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
        .win-box {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px;
        }
        .win-box h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .win-box ul { list-style: none; }
        .win-box ul li {
            display: flex; gap: 12px; padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 12px; color: var(--text-secondary);
        }
        .win-box ul li:last-child { border-bottom: none; }
        .win-num { font-size: 12px; font-weight: 800; width: 22px; flex-shrink: 0; margin-top: 1px; }
        .win-box.red .win-num { color: var(--primary); }
        .win-box.yellow .win-num { color: var(--warning); }
        .win-box.green .win-num { color: var(--success); }

        /* ── FOOTER ── */
        .footer {
            background: var(--dark-secondary); border-top: 1px solid var(--dark-border);
            padding: 24px 40px; margin-top: 40px;
        }
        .footer-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .footer-left { display: flex; align-items: center; gap: 16px; }
        .footer-logo { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: -1px; }
        .footer-info p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

        /* ── SCROLL ANIMATIONS ── */
        .fade-in { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .fade-in.visible { opacity: 1; transform: none; }

        /* ── O QUE É ELG ── */
        .elg-def-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .elg-def-main {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 28px; grid-column: 1 / -1;
            display: flex; gap: 24px; align-items: flex-start;
        }
        .elg-def-icon { font-size: 48px; flex-shrink: 0; }
        .elg-def-main h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .elg-def-main p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
        .elg-stat-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px;
        }
        .elg-stat-card h4 { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .problem-list { list-style: none; }
        .problem-list li {
            font-size: 13px; color: var(--text-secondary); padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            display: flex; gap: 10px; align-items: flex-start; line-height: 1.5;
        }
        .problem-list li:last-child { border-bottom: none; }
        .problem-list li .p-icon { flex-shrink: 0; }

        /* ── ESTEIRA DE PRODUTOS ── */
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .product-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        .product-card:hover { transform: translateY(-3px); border-color: rgba(227,24,55,0.3); }
        .product-card-top { padding: 24px 24px 16px; }
        .product-tier { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: inline-block; padding: 3px 10px; border-radius: 20px; }
        .tier-escala { background: rgba(59,130,246,0.15); color: var(--info); }
        .tier-premium { background: rgba(227,24,55,0.15); color: var(--primary); }
        .tier-retencao { background: rgba(16,185,129,0.15); color: var(--success); }
        .product-card h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
        .product-card .product-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
        .product-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 14px; }
        .product-card-details { background: rgba(0,0,0,0.2); padding: 16px 24px; border-top: 1px solid var(--dark-border); }
        .product-card-details h5 { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
        .product-card-details ul { list-style: none; }
        .product-card-details ul li { font-size: 12px; color: var(--text-secondary); padding: 3px 0; padding-left: 12px; position: relative; }
        .product-card-details ul li::before { content: '✓'; position: absolute; left: 0; color: var(--success); font-size: 10px; }
        .deals-proof { margin-top: 24px; }
        .deals-proof h4 { font-size: 13px; font-weight: 700; color: var(--text-secondary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .deals-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .deal-chip {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 8px; padding: 10px 16px;
            display: flex; flex-direction: column; gap: 2px;
        }
        .deal-chip strong { font-size: 15px; font-weight: 800; color: var(--success); }
        .deal-chip span { font-size: 11px; color: var(--text-muted); }

        /* ── BOW-TIE ── */
        .bowtie-wrapper { overflow-x: auto; padding-bottom: 8px; }
        .bowtie-flow {
            display: flex; align-items: stretch; gap: 0;
            min-width: 900px;
        }
        .bt-step {
            flex: 1; background: var(--dark-card); border: 1px solid var(--dark-border);
            padding: 20px 16px; position: relative;
        }
        .bt-step + .bt-step { border-left: none; }
        .bt-step:first-child { border-radius: 12px 0 0 12px; }
        .bt-step:last-child { border-radius: 0 12px 12px 0; }
        .bt-step.bt-center {
            background: linear-gradient(135deg, rgba(227,24,55,0.12), rgba(227,24,55,0.05));
            border-color: rgba(227,24,55,0.4);
            flex: 1.3;
        }
        .bt-num { font-family: 'Courier New', monospace; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
        .bt-step h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .bt-step p { font-size: 11px; color: var(--text-muted); line-height: 1.5; }
        .bt-tag { display: inline-block; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; padding: 2px 8px; border-radius: 3px; margin-bottom: 8px; }
        .bt-left .bt-tag { background: rgba(59,130,246,0.15); color: var(--info); }
        .bt-center .bt-tag { background: rgba(227,24,55,0.2); color: var(--primary); }
        .bt-right .bt-tag { background: rgba(16,185,129,0.15); color: var(--success); }
        .bt-arrow { display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 18px; padding: 0 2px; background: var(--dark); border-top: 1px solid var(--dark-border); border-bottom: 1px solid var(--dark-border); }
        .jornadas-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
        .jornada-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; overflow: hidden;
        }
        .jornada-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
        .jornada-header h3 { font-size: 15px; font-weight: 700; }
        .jornada-header p { font-size: 12px; color: var(--text-muted); }
        .jornada-body { padding: 16px 20px; }
        .jornada-phase { margin-bottom: 14px; }
        .jornada-phase h5 { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
        .jornada-phase p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; padding-left: 12px; border-left: 2px solid; }

        /* ── FINANCEIRO ── */
        .dre-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .dre-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 12px; padding: 24px;
        }
        .dre-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--text-secondary); }
        .dre-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .dre-row:last-child { border-bottom: none; }
        .dre-row.total { border-top: 2px solid var(--dark-border); padding-top: 14px; margin-top: 4px; }
        .dre-label { font-size: 13px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
        .dre-val { font-size: 14px; font-weight: 700; }
        .dre-val.pos { color: var(--success); }
        .dre-val.neg { color: var(--primary); }
        .dre-val.highlight { color: #fff; font-size: 18px; }
        .dre-sign { font-size: 11px; color: var(--text-muted); margin-right: 4px; }
        .margem-bar-wrap { margin-top: 16px; }
        .margem-bar-wrap label { font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; margin-bottom: 8px; }
        .margem-bar { height: 8px; background: var(--dark-border); border-radius: 4px; overflow: hidden; }
        .margem-fill { height: 100%; background: linear-gradient(90deg, var(--success), #34d399); border-radius: 4px; transition: width 1s ease; }
        .custos-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 12px; }
        .custo-item { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; text-align: center; }
        .custo-item strong { font-size: 15px; font-weight: 800; color: var(--warning); display: block; margin-bottom: 3px; }
        .custo-item span { font-size: 10px; color: var(--text-muted); }
        .premissas-list { list-style: none; }
        .premissas-list li { font-size: 13px; color: var(--text-secondary); padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; gap: 10px; line-height: 1.5; }
        .premissas-list li:last-child { border-bottom: none; }
        .premissas-list li .pi { flex-shrink: 0; color: var(--info); }
        .captacao-methods { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
        .captacao-card {
            background: var(--dark-card); border: 1px solid var(--dark-border);
            border-radius: 10px; padding: 18px;
        }
        .captacao-card h5 { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .captacao-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
        .captacao-card .proof { margin-top: 10px; padding: 8px 12px; background: rgba(16,185,129,0.08); border-left: 2px solid var(--success); border-radius: 0 4px 4px 0; font-size: 11px; color: #6ee7b7; line-height: 1.5; }

        @media(max-width:768px) {
            .elg-def-grid { grid-template-columns: 1fr; }
            .elg-def-main { flex-direction: column; }
            .products-grid { grid-template-columns: 1fr; }
            .jornadas-grid { grid-template-columns: 1fr; }
            .dre-grid { grid-template-columns: 1fr; }
        }
</head>

<main class="main">

    <!-- ── O QUE É O ELG ── -->
    <section id="oelg">
        <div class="section-header fade-in">
            <div class="section-tag">Event Led Growth — Conceito</div>
            <h2>O que é o ELG e qual problema ele resolve</h2>
            <p>Entenda a estratégia central, o problema que motivou sua criação e as soluções propostas para garantir escala com qualidade.</p>
        </div>

        <div class="elg-def-grid">
            <div class="elg-def-main fade-in">
                <div class="elg-def-icon">⚡</div>
                <div>
                    <h3>Event Led Growth (ELG)</h3>
                    <p>Estratégia <strong>híbrida (Físico + Online)</strong> que utiliza eventos como <em style="color:var(--primary);font-style:normal">"isca magnética"</em> para atrair o ICP certo. A V4 entra com a infraestrutura dos espaços físicos (Campinas e SP) e a audiência B2B já mapeada. O modelo de negócio central é o <strong>cliente pagar por lead gerado</strong> no evento — ele foca exclusivamente na narrativa de vendas e conversão, enquanto a V4 garante a atenção do público correto.</p>
                    <p style="margin-top:10px;color:var(--text-muted);font-size:13px">O ELG opera como um <strong>two-sided market (mercado de plataforma)</strong>: um único evento gera valor simultâneo para dois públicos — o Cliente Host (quem patrocina) e o Participante (ICP que comparece).</p>
                </div>
            </div>

            <div class="elg-stat-card fade-in">
                <h4>⚠️ O Problema Central que nos Trouxe Aqui</h4>
                <ul class="problem-list">
                    <li><span class="p-icon">🔴</span><span>A <strong>base da V4 não é suficiente</strong> para garantir o ICP nos eventos dos clientes de forma saudável e sustentável</span></li>
                    <li><span class="p-icon">🔴</span><span>Na maioria dos eventos, era necessário <strong>mobilizar 5 vendedores (força-tarefa)</strong> para convidar simultaneamente nos últimos 45 minutos</span></li>
                    <li><span class="p-icon">🔴</span><span><strong>Baixíssimo índice de resposta:</strong> em determinados dias, o time enviou mensagens para 50 pessoas e não obteve nenhuma resposta</span></li>
                    <li><span class="p-icon">🔴</span><span><strong>Alto número de bloqueios</strong> nos números de WhatsApp do time de convite por dependência do envio manual</span></li>
                    <li><span class="p-icon">🔴</span><span>A mesma base é usada simultaneamente para <strong>ativações de aquisição, orgânico e convites</strong> — saturação total</span></li>
                </ul>
            </div>

            <div class="elg-stat-card fade-in">
                <h4>✅ As 5 Soluções para Garantir o ICP em Escala</h4>
                <ul class="problem-list">
                    <li><span class="p-icon" style="color:var(--success)">①</span><span><strong>Comunidade ELG:</strong> empresas de todos os segmentos em uma base centralizada — convites com formulário para segmentar e ativar apenas o ICP certo por evento</span></li>
                    <li><span class="p-icon" style="color:var(--success)">②</span><span><strong>CRM (WhatsApp API + E-mail):</strong> disparo via API da Meta a R$0,20–0,50/msg. Prova: evento "Origem" → 100 confirmações em 24h, 60% ICP, custo de R$800</span></li>
                    <li><span class="p-icon" style="color:var(--success)">③</span><span><strong>Integração entre setores:</strong> Aquisição e Ouvidoria oferecem acesso à comunidade como benefício e overdelivery para novos e atuais clientes</span></li>
                    <li><span class="p-icon" style="color:var(--success)">④</span><span><strong>Conteúdo Orgânico (Instagram):</strong> depoimentos e after movies capturam o alto tráfego dos dias de evento para construir autoridade e desejo</span></li>
                    <li><span class="p-icon" style="color:var(--success)">⑤</span><span><strong>Tráfego Pago:</strong> campanhas direcionadas para a comunidade (CAC controlado) ou para eventos específicos dos clientes (inserido no custo do projeto)</span></li>
                </ul>
            </div>
        </div>
    </section>

    <hr class="section-divider">

    <!-- ── ESTEIRA DE PRODUTOS ── -->
    <section id="esteira">
        <div class="section-header fade-in">
            <div class="section-tag">Prateleira de Produtos — Esteira de Eventos V4</div>
            <h2>3 Produtos para Diferentes Maturidades e Objetivos</h2>
            <p>A estrutura da oferta permite atender desde a escala máxima até a aquisição cirúrgica, com modelo financeiro validado.</p>
        </div>

        <div class="products-grid fade-in">

            <!-- Produto 1 -->
            <div class="product-card">
                <div class="product-card-top">
                    <div class="product-tier tier-escala">Modelo Replicável · Alta Escala</div>
                    <h3>Eventos Temáticos de Prateleira</h3>
                    <p class="product-sub">Ex: "Made in Future por [Nome da Empresa]"</p>
                    <p>Formato de evento com tema, nome e estrutura <strong>fechados e replicáveis</strong> por cohort ou setor. A V4 cria a propriedade intelectual e o cliente entra como patrocinador principal, comprando a autoridade de um selo já desenhado.</p>
                </div>

                    <h5>Diferenciais</h5>

                        <li>Menor atrito de venda</li>
                        <li>Menor esforço de customização operacional</li>
                        <li>Cliente atrela a marca à infraestrutura V4</li>
                        <li>Selos replicáveis por setor (Tech, Marketing, Logística…)</li>
                    </ul>
                </div>
            </div>

            <!-- Produto 2 -->
            <div class="product-card" style="border-color:rgba(227,24,55,0.3)">

                    <p>Principal aposta estratégica. A infraestrutura V4 atua como <strong>motor de tração</strong>. Altamente personalizável e focado em resolver a dor de topo de funil B2B. O cliente paga por <strong>lead gerado no evento</strong> — ou por contrato fechado.</p>
                </div>
                <div class="product-card-details">
                    <h5>Diferenciais</h5>
                    <ul>
                        <li>Modelo mais premium da esteira</li>
                        <li>Cliente foca 100% em narrativa de vendas</li>
                        <li>V4 entrega previsibilidade de pipeline</li>
                        <li>Comunidade + CRM como máquina de tração</li>
                        <li>Colocamos o decisor certo na cadeira</li>

                </div>
            </div>
        </div>

        <div class="deals-proof fade-in" style="margin-top:24px">
            <h4 style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;display:flex;align-items:center;gap:8px">💼 Contratos Recentes Comprovados (Base dos últimos 8 acordos · 7 eventos reais)</h4>
            <div class="deals-row">
                <div class="deal-chip"><strong>R$318k</strong><span>Faturamento Total Base</span></div>
                <div class="deal-chip"><strong>R$45.428</strong><span>Ticket Médio/Evento</span></div>

            </div>
        </div>

    <!-- ── BOW-TIE ── -->
    <section id="bowtie">
        <div class="section-header fade-in">
            <div class="section-tag">Arquitetura de Receita — Funil Bow-Tie</div>
            <h2>O Centro do Modelo: Como o ELG Funciona na Prática</h2>
            <p>O Bow-Tie divide o funil em duas jornadas paralelas a partir do evento — extraindo o máximo NRR de ambas as pontas simultaneamente.</p>
        </div>

        <div class="bowtie-wrapper fade-in">
            <div class="bowtie-flow">
                <!-- Lado Esquerdo -->
                <div class="bt-step bt-left">
                    <div class="bt-tag">Fase 1</div>
                    <div class="bt-num" style="color:var(--info)">①</div>
                    <h4>Attract</h4>
                    <p>Expandir o topo de funil via Tráfego Pago → Comunidade, Conteúdo Orgânico (Instagram com depoimentos/after movies) e Integração com Aquisição e Ouvidoria.</p>
                </div>
                <div class="bt-arrow">›</div>
                <div class="bt-step bt-left">
                    <div class="bt-tag">Fase 2</div>
                    <div class="bt-num" style="color:var(--info)">②</div>
                    <h4>Educate</h4>
                    <p>Armazenar e nutrir a audiência na <strong>Comunidade ELG</strong>. Acesso vitalício como benefício para novos clientes e oferta do mês de aquisição.</p>
                </div>
                <div class="bt-arrow">›</div>
                <div class="bt-step bt-left">
                    <div class="bt-tag">Fase 3</div>
                    <div class="bt-num" style="color:var(--info)">③</div>
                    <h4>Select</h4>
                    <p>Convidar de forma inteligente via <strong>formulário de segmentação</strong> + CRM Sniper (WhatsApp API + e-mail) apenas para quem se encaixa no ICP do evento.</p>
                </div>
                <div class="bt-arrow">›</div>

                <!-- Centro -->
                <div class="bt-step bt-center">
                    <div class="bt-tag">Fase 4 · Núcleo</div>
                    <div class="bt-num" style="color:var(--primary)">④</div>
                    <h4>Commit — O Evento ELG</h4>
                    <p><strong>Execução Híbrida (Físico + Online)</strong> nos espaços V4 (Campinas e SP). O cliente paga por lead gerado. A V4 garante a atenção do público certo. Tráfego pago auxiliar avaliado contrato a contrato.</p>
                </div>
                <div class="bt-arrow">›</div>

                <!-- Lado Direito -->
                <div class="bt-step bt-right">
                    <div class="bt-tag">Fase 5</div>
                    <div class="bt-num" style="color:var(--success)">⑤</div>
                    <h4>Implement</h4>
                    <p>Passagem de bastão imediata: debriefing com lista de ICPs, métricas de comparecimento e ROI comprovado (Jornada A) · After movies, materiais e feedbacks via Ouvidoria (Jornada B).</p>
                </div>
                <div class="bt-arrow">›</div>
                <div class="bt-step bt-right">
                    <div class="bt-tag">Fase 6</div>
                    <div class="bt-num" style="color:var(--success)">⑥</div>
                    <h4>Activate</h4>
                    <p>Acompanhamento consultivo do sucesso do cliente Host (Jornada A) · Bote comercial da V4 com o Participante que já confia na infraestrutura (Jornada B).</p>
                </div>
                <div class="bt-arrow">›</div>
                <div class="bt-step bt-right">
                    <div class="bt-tag">Fase 7</div>
                    <div class="bt-num" style="color:var(--success)">⑦</div>
                    <h4>Expand</h4>
                    <p>Cross-sell de produtos da holding (Leadbroker, Mídia Paralela, DR-OTE) para o Host (Jornada A) · Assinatura dos produtos core V4 (DR) para o Participante, fortalecendo o NRR (Jornada B).</p>

                    </div>
                    <div class="jornada-phase">

                    </div>
                    <div class="jornada-phase">
                        <h5 style="color:var(--success)">Expand (Upsell / NRR)</h5>
                        <p style="border-color:var(--success)">Retenção para eventos maiores e mais frequentes + cross-sell de produtos da holding: Leadbroker, Mídia Paralela, DR-OTE.</p>
                    </div>
                </div>
            </div>

            <div class="jornada-card">
                <div class="jornada-header" style="background:rgba(16,185,129,0.08);border-bottom:1px solid var(--dark-border)">
                    <div style="font-size:28px">👤</div>
                    <div>
                        <h3>Jornada B — O Participante (ICP)</h3>
                        <p>O lead que estava na comunidade, foi ativado pelo CRM e compareceu ao evento</p>
                    </div>
                </div>
                <div class="jornada-body">
                    <div class="jornada-phase">
                        <h5 style="color:var(--primary)">Implement (Pós-evento imediato)</h5>
                        <p style="border-color:var(--primary)">Envio de after movies, materiais das palestras e bônus. Ouvidoria aciona para colher feedbacks como overdelivery — percepção de valor altíssima sobre a V4.</p>
                    </div>
                    <div class="jornada-phase">
                        <h5 style="color:var(--warning)">Activate (Bote comercial)</h5>
                        <p style="border-color:var(--warning)">Time de Aquisição entra em contato consultivo: o participante já consumiu o evento e confia na infraestrutura V4. Momento ideal para ativação.</p>
                    </div>
                    <div class="jornada-phase">
                        <h5 style="color:var(--success)">Expand (Receita Recorrente)</h5>
                        <p style="border-color:var(--success)">Participante assina contrato dos produtos core V4 (DR). Fortalece o NRR com CAC já parcialmente amortizado pela operação do evento.</p>
                    </div>
                </div>
            </div>
        </div>

    <!-- ── FINANCEIRO ── -->
    <section id="financeiro">
        <div class="section-header fade-in">
            <div class="section-tag">Viabilidade Financeira — Prévia de DRE</div>
            <h2>Economics e Projeção de Receita</h2>
            <p>Baseado nos últimos 8 acordos comerciais fechados (7 eventos reais). Demonstra a alta viabilidade do modelo.</p>

                    <div class="margem-bar"><div class="margem-fill" style="width:78%"></div></div>
                </div>
                <p style="font-size:11px;color:var(--text-muted);margin-top:14px;line-height:1.6">⚠️ Esta é uma prévia simplificada. O DRE final contemplará: custo unitário por pessoa, CAC de tráfego para comunidade, custos de disparo de CRM, impostos e comissionamento dos closers.</p>
            </div>

            <!-- Custos + Premissas -->
            <div>
                <div class="dre-card" style="margin-bottom:20px">
                    <h4>⚙️ Custos Diretos Variáveis por Evento</h4>
                    <div class="custos-grid">
                        <div class="custo-item"><strong>R$3k–9k</strong><span>A&B por evento</span></div>
                        <div class="custo-item"><strong>R$1.000</strong><span>Foto/Vídeo (AV)</span></div>

                </div>

                <div class="dre-card">
                    <h4>📋 Premissas Operacionais</h4>
                    <ul class="premissas-list">

<script>
    // Nav tabs
    document.querySelectorAll('.nav-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
        });
    });

    function goToSection(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Table filter
    function filterTable(cat, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#actionsTable tbody tr').forEach(row => {
            if (cat === 'all' || row.dataset.cat === cat) {
                row.classList.remove('hidden-row');
            } else {
                row.classList.add('hidden-row');
            }
        });
    }

    // Fade-in on scroll
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.08 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
